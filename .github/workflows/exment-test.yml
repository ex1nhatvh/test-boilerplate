name: Exment Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [browser, feature, unit]

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: taisandambao
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, mysql, mbstring, xml, openssl, gd, zip, bcmath, intl, fileinfo, tokenizer, json, curl
          ini-values: memory_limit=-1, max_execution_time=600
          coverage: none

      - name: Clone local path dependencies (exment and open-admin-core)
        run: |
          if [ -n "$GH_PAT" ]; then
            git clone --depth=1 --branch feature/laravel-12 \
              "https://x-access-token:${GH_PAT}@github.com/exceedone/exment.git" exment
            git clone --depth=1 --branch feature/laravel-12 \
              "https://x-access-token:${GH_PAT}@github.com/ex1nhatvh/open-admin-core.git" open-admin-core
          else
            git clone --depth=1 --branch feature/laravel-12 \
              "https://github.com/exceedone/exment.git" exment
            git clone --depth=1 --branch feature/laravel-12 \
              "https://github.com/ex1nhatvh/open-admin-core.git" open-admin-core
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies (without scripts)
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME=Exment
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          APP_TIMEZONE=Asia/Tokyo
          APP_LOCALE=ja

          DB_CONNECTION=mariadb
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=taisandambao
          DB_USERNAME=root
          DB_PASSWORD=password

          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Generate APP_KEY (without artisan)
        run: |
          KEY=$(php -r "echo 'base64:'.base64_encode(random_bytes(32));")
          if grep -q '^APP_KEY=' .env; then
            sed -i "s/^APP_KEY=.*/APP_KEY=$KEY/" .env
          else
            echo "APP_KEY=$KEY" >> .env
          fi

      - name: Generate Passport RSA keys
        run: |
          php artisan passport:keys --force

      - name: Clear Config Cache
        run: php artisan config:clear

      - name: Run suite
        id: run-suite
        run: |
          set -o pipefail
          rm -f output-${{ matrix.suite }}.txt exit-${{ matrix.suite }}.code || true
          echo "=== ${{ matrix.suite }} tests ===" | tee -a output-${{ matrix.suite }}.txt
          composer run exment:test:${{ matrix.suite }} 2>&1 | tee -a output-${{ matrix.suite }}.txt
          code=$?
          echo $code > exit-${{ matrix.suite }}.code
        continue-on-error: true

      - name: Upload suite output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output-${{ matrix.suite }}
          path: |
            output-${{ matrix.suite }}.txt
            exit-${{ matrix.suite }}.code
          retention-days: 30

  summarize:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine artifacts
        id: combine
        run: |
          mkdir -p results
          for s in browser feature unit; do
            dir="artifacts/output-$s"
            if [ -d "$dir" ]; then
              echo "=== $s tests ===" >> results/output.txt
              # prefer the primary output file if present
              if [ -f "$dir/output-$s.txt" ]; then
                cat "$dir/output-$s.txt" >> results/output.txt
              else
                cat $dir/*.txt >> results/output.txt || true
              fi
              echo "" >> results/output.txt
            fi
            if [ -f "$dir/exit-$s.code" ]; then
              cp "$dir/exit-$s.code" exit-$s.code
            fi
          done

          EXIT_CODE=0
          for c in exit-browser.code exit-feature.code exit-unit.code; do
            if [ -f "$c" ]; then
              code=$(cat "$c" | tr -d '[:space:]')
              if [ "$code" -ne 0 ]; then
                EXIT_CODE=$code
              fi
            fi
          done

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Write Test Summary
        run: |
          echo "## Exment Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Exit Code:** ${{ steps.combine.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f results/output.txt ]; then
            tail -n 200 results/output.txt >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test output as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: results/output.txt
          retention-days: 30

      - name: Commit output.txt to test-results branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp results/output.txt output.txt || true
          git fetch origin test-results 2>/dev/null || true
          git checkout --orphan test-results-temp
          git reset --hard
          git add output.txt || true
          git commit -m "Test results from run ${{ github.run_number }} ($(date -u +%Y-%m-%dT%H:%M:%SZ))" || true
          git push origin HEAD:test-results --force || true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if tests failed
        if: ${{ steps.combine.outputs.exit_code != '0' }}
        run: |
          echo "One or more suites failed (exit=${{ steps.combine.outputs.exit_code }})."
          exit ${{ steps.combine.outputs.exit_code }}
