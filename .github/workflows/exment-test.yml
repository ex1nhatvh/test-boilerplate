name: Exment Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [browser, feature, unit]

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: taisandambao
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, mysql, mbstring, xml, openssl, gd, zip, bcmath, intl, fileinfo, tokenizer, json, curl
          ini-values: memory_limit=-1, max_execution_time=600
          coverage: none

      - name: Clone local path dependencies (exment and open-admin-core)
        run: |
          if [ -n "$GH_PAT" ]; then
            git clone --depth=1 --branch feature/laravel-12 \
              "https://x-access-token:${GH_PAT}@github.com/exceedone/exment.git" exment
            git clone --depth=1 --branch feature/laravel-12 \
              "https://x-access-token:${GH_PAT}@github.com/ex1nhatvh/open-admin-core.git" open-admin-core
          else
            git clone --depth=1 --branch feature/laravel-12 \
              "https://github.com/exceedone/exment.git" exment
            git clone --depth=1 --branch feature/laravel-12 \
              "https://github.com/ex1nhatvh/open-admin-core.git" open-admin-core
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies (without scripts)
        run: composer update --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME=Exment
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          APP_TIMEZONE=Asia/Tokyo
          APP_LOCALE=ja

          DB_CONNECTION=mariadb
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=taisandambao
          DB_USERNAME=root
          DB_PASSWORD=password

          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Generate APP_KEY (without artisan)
        run: |
          KEY=$(php -r "echo 'base64:'.base64_encode(random_bytes(32));")
          if grep -q '^APP_KEY=' .env; then
            sed -i "s/^APP_KEY=.*/APP_KEY=$KEY/" .env
          else
            echo "APP_KEY=$KEY" >> .env
          fi

      - name: Generate Passport RSA keys
        run: |
          php artisan passport:keys --force

      - name: Clear Config Cache
        run: php artisan config:clear

      # - name: Run suite
      #   id: run-suite
      #   run: |
      #     set -o pipefail
      #     rm -f output-${{ matrix.suite }}.txt exit-${{ matrix.suite }}.code || true
      #     echo "=== ${{ matrix.suite }} tests ===" | tee -a output-${{ matrix.suite }}.txt
      #     composer run exment:test:${{ matrix.suite }} 2>&1 | tee -a output-${{ matrix.suite }}.txt
      #     code=$?
      #     echo $code > exit-${{ matrix.suite }}.code
      #   continue-on-error: true

  checks-checklang:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Common setup
        uses: ./.github/actions/setup-exment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Run exment:checklang
        run: php artisan exment:checklang

  checks-phpstan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Common setup
        uses: ./.github/actions/setup-exment
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Prepare PHPStan
        run: |
          cp vendor/exceedone/exment/phpstan.neon.dist .
          # If the larastan extension file is not installed at the repository root,
          # remove the include and comment out the includes block to avoid failure.
          if [ ! -f vendor/nunomaduro/larastan/extension.neon ]; then
            sed -i '/vendor\/nunomaduro\/larastan\/extension.neon/d' phpstan.neon.dist || true
            sed -i 's/^includes:/#includes:/' phpstan.neon.dist || true
          fi

      - name: Run PHPStan
        run: |
          set -o pipefail
          vendor/bin/phpstan analyse -c phpstan.neon.dist exment --error-format=json > phpstan.json || true

      - name: Upload PHPStan report
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-report
          path: phpstan.json
